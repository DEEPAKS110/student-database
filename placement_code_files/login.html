<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Student Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Reset and Variables */
        :root {
            --primary-color: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --bg-gradient-start: #4158D0;
            --bg-gradient-mid: #C850C0;
            --bg-gradient-end: #FFCC70;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --error-color: #ef4444;
            --input-border: #e5e7eb;
            --input-focus: #6366f1;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #4158D0;
            background-image: linear-gradient(43deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 46%, var(--bg-gradient-end) 100%);
            padding: 1rem;
            color: var(--text-main);
        }

        /* Glassmorphism Card Effect */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--input-border);
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .form-control:focus {
            border-color: var(--input-focus);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        /* Error state styling */
        .form-control.is-invalid {
            border-color: var(--error-color);
            background-color: #fef2f2;
        }
        
        .form-control.is-invalid:focus {
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .error-text {
            color: var(--error-color);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 1rem;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .form-control {
                padding: 0.75rem;
            }
            .btn {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h1>Official Student Login</h1>
            <p>Welcome! Please enter your details.</p>
        </div>

        <form id="studentLoginForm" novalidate>
            <div class="form-group">
                <label for="registerNumber">Register Number</label>
                <input type="text" id="registerNumber" class="form-control" placeholder="e.g. REG2023001" autocomplete="off">
                <div class="error-text" id="regError"></div>
            </div>

            <div class="form-group">
                <label for="emailId">Email ID</label>
                <input type="email" id="emailId" class="form-control" placeholder="student@university.edu" autocomplete="email">
                <div class="error-text" id="emailError"></div>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('studentLoginForm');
            const registerInput = document.getElementById('registerNumber');
            const emailInput = document.getElementById('emailId');
            
            // Error elements
            const regError = document.getElementById('regError');
            const emailError = document.getElementById('emailError');

            // Email validation regex (standard pattern)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Clear errors when user types
            registerInput.addEventListener('input', () => clearError(registerInput, regError));
            emailInput.addEventListener('input', () => clearError(emailInput, emailError));

            function clearError(inputElement, errorElement) {
                inputElement.classList.remove('is-invalid');
                errorElement.style.display = 'none';
                errorElement.textContent = '';
            }

            function showError(inputElement, errorElement, message) {
                inputElement.classList.add('is-invalid');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault(); 
                
                let isValid = true;
                const regValue = registerInput.value.trim();
                const emailValue = emailInput.value.trim();

                // Validate Register Number
                if (regValue === '') {
                    showError(registerInput, regError, 'Register number is required');
                    isValid = false;
                }

                // Validate Email
                if (emailValue === '') {
                    showError(emailInput, emailError, 'Email ID is required');
                    isValid = false;
                } else if (!emailPattern.test(emailValue)) {
                    showError(emailInput, emailError, 'Please enter a valid email format');
                    isValid = false;
                }

                // Process successful login
                if (isValid) {
                    // Update button UI state
                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Logging in...';
                    submitBtn.style.opacity = '0.8';
                    submitBtn.disabled = true;

                    // 1. Store login status in Local Storage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('studentRegNum', regValue);

                    // 2. Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 600);
                }
            });
        });
    </script>
</body>
</html>
